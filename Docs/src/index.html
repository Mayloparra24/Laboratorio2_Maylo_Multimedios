<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/index.css">
    <title>La Sede Acompaña - UCR</title>
</head>
<body>
    <div class="cartel-container">
        <!-- Fondo amarillo principal -->
        <div class="cartel">
            <!-- Header con cintas -->
            <div class="header">
                <div class="ribbon-container">
                    <span class="word-la">LA SEDE</span>
                    <span class="ribbon-separator"></span>
                    <span class="word-acompana">ACOMPAÑA</span>
                </div>
            </div>

            <!-- Contenido principal -->
            <div class="content">
                <!-- Texto principal -->
                <div class="main-text">
                    <p class="text-line-1">El respeto no se negocia</p>
                    <p class="text-line-2">¡Para ya de acosar!</p>
                </div>
                <div class="qr-code">
                    <img src="../Images/qr.png" alt="Código QR" class="qr-img">
                </div>

                <!-- Imagen de personas -->
                <div class="image-container">
                    <img src="../Images/Personas.png" alt="Personas campña">
                </div>

                <!-- Logos y información -->
                <div class="footer-info">
                    <div class="logo-section">
                        <img src="../Images/UCR_Blanco.png" alt="Logo UCR" class="ucr-logo-img">
                        <div class="logo-text">
                            <span class="divider">|</span>
                            <span class="additional-text">SERVICIOS<br>GENERALES</span>
                            <span class="divider">|</span>
                            <span class="additional-text">SEDE DE<br>GUANACASTE</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
